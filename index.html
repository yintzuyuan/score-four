<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>方垛式四子棋 · Score Four</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>

<header>
  <div class="title"><span class="zh">方垛式四子棋</span><span>Score Four</span></div>
  <div class="meta">4 × 4 × 4 · LOCAL HOTSEAT</div>
</header>

<main>
  <div id="canvas-wrap"></div>

  <div class="hud tl">
    <div class="turn-card">
      <div id="turn-dot" class="dot p1"></div>
      <div>
        <div class="turn-label" id="turn-label">朱方落子</div>
        <div class="turn-num" id="turn-num">第 1 手</div>
      </div>
    </div>
  </div>

  <div class="hud tr">
    <div class="scoreboard">
      <div class="score-cell p1">
        <div class="dot p1"></div>
        <div class="score-num" id="score-p1">0</div>
      </div>
      <div class="score-cell p2">
        <div class="dot p2"></div>
        <div class="score-num" id="score-p2">0</div>
      </div>
    </div>
  </div>

  <div class="hud tl-sub" id="status-msg">拖拽旋轉視角 · 點選柱底落子 · 方向鍵選取後 Enter</div>

  <div class="winner-card-side" id="winner-card" hidden>
    <button class="winner-close" id="winner-close" aria-label="關閉">×</button>
    <div class="winner-eyebrow" id="winner-eyebrow">勝負已分</div>
    <div class="winner-title" id="winner-title">朱方勝</div>
    <div class="winner-sub" id="winner-sub">連成一線</div>
    <div class="winner-actions">
      <button class="btn primary" id="winner-replay">再來一局</button>
      <button class="btn" id="winner-view">檢視棋盤</button>
    </div>
  </div>
</main>

<footer>
  <div class="controls">
    <button class="btn primary" id="btn-new">新局</button>
    <button class="btn" id="btn-undo">悔棋</button>
    <button class="btn" id="btn-reset-view">重置視角</button>
    <button class="btn" id="btn-rules">規則</button>
  </div>
  <div class="hint">
    <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> 選取 · <kbd>Enter</kbd> 落子 · <kbd>[</kbd><kbd>]</kbd> 旋轉 · <kbd>R</kbd> 重置視角 · <kbd>Z</kbd> 悔棋 · <kbd>N</kbd> 新局
  </div>
</footer>

<script type="module" src="/src/main.js"></script>

</body>
</html>
